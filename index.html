<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nexus Ultra | Pro Edition</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<meta name="theme-color" content="#050607">

<link rel="manifest" href='data:application/manifest+json,{
  "name": "Nexus Ultra",
  "short_name": "Nexus",
  "description": "Advanced AI Interface",
  "display": "standalone",
  "start_url": ".",
  "background_color": "#050607",
  "theme_color": "#00ff88",
  "icons": [{"src": "icon.png", "sizes": "192x192", "type": "image/png"}, {"src": "icon.png", "sizes": "512x512", "type": "image/png"}]
}'>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
/* ========== 1. NEXUS DESIGN SYSTEM 2.0 ========== */
:root {
  --accent: #00ff88; --bg: #050607; 
  --glass: rgba(255, 255, 255, 0.03);
  --glass-heavy: rgba(255, 255, 255, 0.08); 
  --border: rgba(255, 255, 255, 0.1);
  --text: #f0f0f0; --text-muted: #a0a0a0; 
  --grad-1: #004d33; --grad-2: #002244;
  --radius: 18px;
}

[data-theme="frost"] { --accent: #00d9ff; --grad-1: #002b36; --grad-2: #1a1a2e; }
[data-theme="ember"] { --accent: #ff4d00; --grad-1: #330d00; --grad-2: #1a0a00; }
[data-theme="cyber"] { --accent: #ff00ea; --grad-1: #220033; --grad-2: #050505; }

body.light { 
  --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.6); --glass-heavy: rgba(255, 255, 255, 0.9); 
  --border: rgba(0, 0, 0, 0.08); --text: #1e293b; --text-muted: #64748b; 
  --grad-1: #e2e8f0; --grad-2: #cbd5e1; 
}
body.light[data-theme="default"] { --accent: #10b981; --grad-1: #d1fae5; --grad-2: #a7f3d0; }
body.light[data-theme="frost"] { --accent: #0284c7; --grad-1: #e0f2fe; --grad-2: #bae6fd; }
body.light[data-theme="ember"] { --accent: #ea580c; --grad-1: #ffedd5; --grad-2: #fed7aa; }
body.light[data-theme="cyber"] { --accent: #db2777; --grad-1: #fce7f3; --grad-2: #fbcfe8; }

* { box-sizing: border-box; font-family: 'Inter', -apple-system, system-ui, sans-serif; transition: background 0.3s, border 0.3s, color 0.3s; }
body, html { margin: 0; height: 100dvh; background: var(--bg); color: var(--text); overflow: hidden; position: fixed; width: 100%; }

#liquid-bg { position: fixed; inset: -10%; z-index: -1; background-image: radial-gradient(circle at 10% 20%, var(--grad-1), transparent 40%), radial-gradient(circle at 90% 80%, var(--grad-2), transparent 50%); filter: blur(70px); animation: drift 15s infinite alternate ease-in-out; }
@keyframes drift { from { transform: scale(1) rotate(0deg); } to { transform: scale(1.1) rotate(2deg); } }

.app { display: flex; height: 100dvh; padding: 12px; gap: 12px; backdrop-filter: blur(20px); }

/* ========== 2. SIDEBAR PRO ========== */
.sidebar { 
  width: 280px; background: var(--glass); backdrop-filter: blur(50px); border-radius: 24px; border: 1px solid var(--border); 
  display: flex; flex-direction: column; z-index: 1000; overflow: hidden; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), width 0.4s, opacity 0.4s;
}
.sidebar.collapsed { width: 0; padding: 0; margin: 0; border: none; opacity: 0; pointer-events: none; }

.sidebar-header { padding: 30px 20px 10px; font-weight: 900; color: var(--accent); letter-spacing: 4px; text-align: center; font-size: 1.2rem; text-shadow: 0 0 15px var(--accent); }

.collapsible { background: var(--glass-heavy); border: none; color: var(--accent); cursor: pointer; padding: 12px 20px; width: 100%; text-align: left; font-size: 0.8rem; font-weight: 800; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.content { padding: 15px; display: none; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); }
body.light .content { background: rgba(0,0,0,0.03); }
.instruction-box { width: 100%; background: var(--glass); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px; font-size: 0.75rem; resize: none; min-height: 80px; outline: none; }

.themed-select { background: var(--glass-heavy); color: var(--accent); border: 1px solid var(--accent); border-radius: 8px; padding: 6px; font-size: 0.75rem; cursor: pointer; outline: none; }
.themed-select option { background: var(--bg); color: var(--text); }
.export-btn { background: var(--glass-heavy); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px; font-size: 0.7rem; cursor: pointer; width: 100%; margin-top: 5px; transition: 0.2s; }
.export-btn:hover { border-color: var(--accent); color: var(--accent); }

.chat-list { flex: 1; overflow-y: auto; padding: 10px; }
.chat-item { 
  padding: 14px; border-radius: var(--radius); cursor: pointer; margin-bottom: 8px; font-size: 0.85rem; 
  background: transparent; border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; transition: 0.2s;
}
.chat-item:hover { background: var(--glass); }
.chat-item.active { border-color: var(--accent); background: var(--glass-heavy); color: var(--accent); font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.del-btn { opacity: 0; font-size: 1.1rem; color: #ff4444; border: none; background: none; cursor: pointer; transition: 0.2s; }
.chat-item:hover .del-btn { opacity: 1; }

.new-chat { margin: 15px; padding: 14px; background: var(--accent); color: #000; border-radius: var(--radius); text-align: center; font-weight: 800; cursor: pointer; box-shadow: 0 5px 20px rgba(0,255,136,0.3); transition: 0.2s; }
.new-chat:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,255,136,0.4); }

/* ========== 3. MAIN AREA PRO ========== */
.main { flex: 1; background: var(--glass); backdrop-filter: blur(50px); border-radius: 28px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.1); }
body.light header { background: rgba(255,255,255,0.2); }

.header-btn { background: var(--glass-heavy); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 8px; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.header-btn:hover { border-color: var(--accent); color: var(--accent); }

#view { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth; }

#view::-webkit-scrollbar, .chat-list::-webkit-scrollbar { width: 5px; }
#view::-webkit-scrollbar-thumb, .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

/* ========== 4. CHAT BUBBLES 2.0 ========== */
.msg-container { display: flex; flex-direction: column; max-width: 85%; animation: msgIn 0.3s ease-out; }
.msg-container.me { align-self: flex-end; align-items: flex-end; }
.msg-container.them { align-self: flex-start; align-items: flex-start; }

.msg { padding: 16px 22px; border-radius: 22px; line-height: 1.7; font-size: 0.98rem; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow-wrap: break-word; word-break: normal; hyphens: none; }
.me .msg { background: linear-gradient(135deg, var(--accent), #00cc6e); color: #000; font-weight: 500; border-bottom-right-radius: 4px; }
.them .msg { background: var(--glass-heavy); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

.msg-container.text-mode { max-width: 100%; width: 100%; align-self: center; }
.text-mode .msg { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px; padding: 25px; width: 100%; font-family: 'Inter', sans-serif; box-shadow: inset 0 0 20px rgba(0,0,0,0.1); }
body.light .text-mode .msg { background: rgba(255,255,255,0.6); box-shadow: inset 0 0 20px rgba(255,255,255,0.5); }

.script-mode .msg { background: rgba(0,255,136,0.05); border: 1px solid var(--accent); padding: 0; overflow: hidden; border-radius: 12px; }
.script-mode .msg pre { margin: 0; border-radius: 0; }

.img-wrapper { position: relative; margin-top: 10px; display: inline-block; max-width: 100%; width: 100%; min-width: 250px; }
.ai-img { width: 100%; max-width: 512px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: block; transition: opacity 0.3s ease; }
.img-loading { padding: 50px 20px; text-align: center; background: var(--glass-heavy); border-radius: 12px; border: 1px dashed var(--accent); color: var(--accent); font-weight: 600; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 15px; max-width: 512px; }

.msg strong { font-weight: 800; }
.msg blockquote { border-left: 3px solid var(--accent); margin: 10px 0; padding-left: 10px; opacity: 0.8; }

.code-wrapper { background: #0d1117; border-radius: 14px; margin: 15px 0; overflow: hidden; border: 1px solid var(--border); }
body.light .code-wrapper { background: rgba(0,0,0,0.03); }
.code-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 18px; background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--border); font-size: 0.7rem; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
body.light .code-header { background: rgba(0,0,0,0.05); }
.copy-btn { background: var(--glass-heavy); border: 1px solid var(--border); color: var(--accent); border-radius: 6px; padding: 4px 12px; cursor: pointer; transition: 0.2s; }
.copy-btn:hover { background: var(--accent); color: #000; }
.msg pre { margin: 0; padding: 18px; overflow-x: auto; background: transparent; border-radius: 0 0 12px 12px; }
body.light .msg pre { background: transparent; }
.msg code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.85em; }
p code { background: rgba(0,0,0,0.2); padding: 2px 5px; border-radius: 6px; font-size: 0.9em; }

.msg-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 8px; display: flex; gap: 12px; opacity: 0.6; transition: 0.2s; flex-wrap: wrap; }
.msg-meta:hover { opacity: 1; }
.action-btn { background: var(--glass); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 4px; transition: 0.2s; }
.action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--glass-heavy); }
.action-btn.premium { border-color: rgba(255, 0, 234, 0.5); color: #ff00ea; }
.action-btn.premium:hover { background: rgba(255, 0, 234, 0.1); border-color: #ff00ea; }

.chips-wrap { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: auto; padding-bottom: 20px; }
.chip { background: var(--glass-heavy); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; border-radius: 100px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
.chip:hover { border-color: var(--accent); color: var(--accent); }

.typing-cursor { display: inline-block; width: 6px; height: 15px; background: var(--accent); margin-left: 5px; vertical-align: middle; animation: blink 0.8s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

.fade-text { animation: textFade 0.2s ease-in forwards; opacity: 0; }
@keyframes textFade { to { opacity: 1; } }

@keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.loader-wrap { display: flex; align-items: center; gap: 6px; padding: 10px 25px; display: none; }
.dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { transform: scale(0.6); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 1; } }

/* ========== 5. FOOTER & INPUT ========== */
footer { padding: 20px 30px 30px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }
.word-count { font-size: 0.65rem; color: var(--text-muted); text-align: right; padding-right: 15px; opacity:0.6; }
.input-row { display: flex; gap: 12px; background: var(--glass-heavy); padding: 10px 10px 10px 20px; border-radius: 30px; border: 1px solid var(--border); align-items: flex-end; box-shadow: 0 10px 40px rgba(0,0,0,0.3); transition: 0.3s; }
.input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,255,136,0.15); }

textarea#input { flex: 1; background: none; border: none; outline: none; color: inherit; font-size: 1rem; resize: none; min-height: 24px; max-height: 200px; overflow-y: auto; padding: 8px 0; margin-bottom: 2px; line-height: 1.5; }
.circle-btn { background: var(--accent); color: #000; border-radius: 50%; width: 42px; height: 42px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; box-shadow: 0 4px 15px rgba(0,255,136,0.3); transition: 0.2s; }
.circle-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,255,136,0.5); }
.attach-btn { background: transparent; border: none; color: var(--text-muted); opacity: 0.6; cursor: pointer; font-size: 1.5rem; padding: 0 5px; margin-bottom: 6px; transition: 0.2s; }
.attach-btn:hover { opacity: 1; color: var(--accent); }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 950; backdrop-filter: blur(5px); }
.overlay.active { display: block; }

/* ========== 6. MOBILE RESPONSIVE OVERRIDES ========== */
@media (max-width: 768px) {
  .app { padding: 0; gap: 0; }
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 85%; max-width: 320px; border-radius: 0 24px 24px 0; }
  .sidebar.open { transform: translateX(0); box-shadow: 0 0 100px rgba(0,0,0,0.8); }
  .main { border-radius: 0; border: none; }
  header { padding: 10px; }
  .header-btn { padding: 5px 10px; font-size: 1.1rem; }
  #modelSelect { max-width: 140px; font-size: 0.7rem; padding: 6px 4px; }
  #view { padding: 15px 10px; gap: 15px; }
  .msg-container { max-width: 95%; }
  .msg { padding: 12px 16px; font-size: 0.9rem; }
  footer { padding: 10px 15px 15px; }
  .input-row { padding: 6px 8px 6px 12px; }
  textarea#input { font-size: 0.95rem; }
  .circle-btn { width: 36px; height: 36px; margin-bottom: 2px; font-size: 1rem;}
  .attach-btn { font-size: 1.3rem; margin-bottom: 4px; }
}
</style>
</head>

<body>
<div id="liquid-bg"></div>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">NEXUS</div>
    
    <button class="collapsible" onclick="toggleCollapsible()">⚙ SETTINGS & MEMORY</button>
    <div class="content" id="settingsContent">
        <label style="font-size: 0.6rem; opacity: 0.6; color: var(--text);">SYSTEM INSTRUCTIONS</label>
        <textarea id="systemPrompt" class="instruction-box" placeholder="Memory instructions..." oninput="updateMemory()"></textarea>
        
        <div style="display:flex; gap: 5px; margin-top: 5px;">
            <button class="export-btn" onclick="exportMemory()">Export Mem</button>
            <button class="export-btn" onclick="$('memoryImport').click()">Import Mem</button>
            <input type="file" id="memoryImport" style="display:none" onchange="importMemory(this)" accept=".txt">
        </div>

        <label style="font-size: 0.6rem; opacity: 0.6; color: var(--text); display: block; margin-top: 15px;">AI ENGINE</label>
        <label style="display:flex; align-items:center; gap:8px; font-size:0.8rem; margin-top:5px; cursor:pointer;">
            <input type="checkbox" id="intelToggle" onchange="toggleIntel(this.checked)" style="accent-color:var(--accent); width: 16px; height: 16px;">
            Enable Deep Reasoning (CoT)
        </label>

        <label style="font-size: 0.6rem; opacity: 0.6; color: var(--text); display: block; margin-top: 15px;">OUTPUT FLOW</label>
        <select id="flowSelect" class="themed-select" onchange="applyFlow(this.value)" style="width: 100%; margin-top: 5px;">
            <option value="raw">Raw (Real-time stream)</option>
            <option value="smooth">Smooth (Fade-in words)</option>
            <option value="typewriter">Typewriter (Characters)</option>
        </select>
        
        <div id="speedWrap" style="display:none; margin-top: 10px;">
            <label style="font-size: 0.6rem; opacity: 0.6; color: var(--text); display: flex; justify-content: space-between;">
                <span>SPEED</span> <span id="speedVal">80%</span>
            </label>
            <input type="range" id="flowSpeed" min="1" max="100" value="80" oninput="applySpeed(this.value)" style="width: 100%; margin-top: 5px; accent-color: var(--accent);">
        </div>

        <div style="margin-top:15px; display:flex; gap:5px; align-items:center;">
            <select id="themeSelect" class="themed-select" onchange="applyTheme(this.value)" style="flex:1;">
                <option value="default">Forest</option>
                <option value="frost">Arctic</option>
                <option value="ember">Vulcan</option>
                <option value="cyber">Royal</option>
            </select>
            <button onclick="toggleTheme()" style="background:var(--glass-heavy); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px; font-size:0.8rem; cursor:pointer;">☀</button>
        </div>
        <div id="memNotify" style="font-size: 0.6rem; color: var(--accent); margin-top: 5px; display: none;">Saved.</div>
    </div>

    <div style="padding: 10px 15px 5px;">
        <input type="text" id="searchChats" class="instruction-box" style="min-height: 35px; height: 35px; padding: 5px 12px; border-radius: 12px; margin-top: 0; font-size: 0.8rem;" placeholder="🔍 Search transmissions..." oninput="filterChats()">
    </div>

    <div class="chat-list" id="chatList"></div>
    <div class="new-chat" onclick="newChat()">＋ New Transmission</div>
  </aside>

  <main class="main">
    <header>
      <div style="display:flex; align-items:center; gap:8px; flex-shrink: 0;">
        <button class="header-btn" onclick="toggleSidebar()">☰</button>
      </div>
      
      <select id="modelSelect" class="themed-select" style="flex: 1; max-width: 220px; background:none; border:none; color:var(--accent); font-weight:800; font-size: 0.85rem;">
        <option value="multi">MULTI-GPT (Default)</option>
        <option value="llama-3.3-70b-versatile">LLAMA 3.3 (Smart)</option>
        <option value="llama-3.1-8b-instant">LLAMA 3.1 (Fast)</option>
        <option value="qwen/qwen-2.5-72b-instruct:free">QWEN 2.5 (Logic)</option>
      </select>

      <span id="header-title" style="font-weight:800; color:var(--accent); font-size:0.7rem; opacity: 0.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px;">READY_</span>
    </header>

    <div id="view"></div>

    <div class="loader-wrap" id="loader">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <footer>
      <div class="word-count" id="wordCount">0 words</div>
      <div class="input-row">
        <input type="file" id="fileInput" style="display:none" onchange="handleFileUpload(this)">
        <button class="attach-btn" onclick="$('fileInput').click()" title="Attach File">📎</button>
        <textarea id="input" rows="1" placeholder="Message Nexus... (/script, /image, /himage, /text)" autocomplete="off"></textarea>
        <button class="circle-btn" onclick="send()">↑</button>
      </div>
    </footer>
  </main>
</div>

<script>
const $ = id => document.getElementById(id);

// Shattering URLs to prevent markdown auto-linking corruption
const w_p1 = "https://";
const w_p2 = "hidden-breeze-d81b";
const w_sub = ".minedabstudios.workers.dev/";
const WORKER_URL = w_p1 + w_p2 + w_sub;

const img_p1 = "https://";
const img_p2 = "image.pollinations.ai";

const inputArea = $('input');
inputArea.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
    const words = this.value.trim().split(/\s+/).filter(w => w.length > 0).length;
    $('wordCount').innerText = words + (words === 1 ? " word" : " words");
});
inputArea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function md(t){
  let parsed = t
    .replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
        let langLabel = lang ? lang.toUpperCase() : 'CODE';
        return `<div class="code-wrapper">
                  <div class="code-header">
                      <span>${langLabel}</span>
                      <button class="copy-btn" onclick="copyToClipboard(this)">Copy</button>
                  </div>
                  <pre><code class="language-${lang}">${code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
                </div>`;
    })
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>") 
    .replace(/(^|[^\*])\*([^\s\*](?:[^\*]*?[^\s\*])?)\*(?=[^\*]|$)/g, "$1<em>$2</em>") 
    .replace(/^> (.+)$/gm, "<blockquote>$1</blockquote>") 
    .replace(/`([^`]+)`/g,"<code>$1</code>") 
    .replace(/\n/g,"<br>\n"); 
  return parsed;
}

function copyToClipboard(btn) {
    const codeBlock = btn.parentElement.nextElementSibling.querySelector('code') || btn.parentElement.nextElementSibling;
    navigator.clipboard.writeText(codeBlock.innerText);
    btn.innerText = "Copied!";
    setTimeout(() => btn.innerText = "Copy", 2000);
}

function downloadScript(code, ext) {
    const cleanCode = code.replace(/```[a-z]*\n?/g, '').replace(/```/g, '');
    const blob = new Blob([cleanCode], {type: "text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "nexus_script_" + Date.now() + ext;
    a.click();
}

async function downloadImage(imgUrl, fileName, btn) {
    btn.innerText = "⏳ Downloading...";
    try {
        const response = await fetch(imgUrl);
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;

function getTime() { return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }

function newChat(isInit = false){
  const id = Date.now().toString();
  chats.unshift({id,title:"New Chat",messages:[]});
  save(); renderList(); loadChat(id);
  
  if(!isInit && window.innerWidth <= 768) {
      $('sidebar').classList.remove('open');
      $('overlay').classList.remove('active');
  }

function loadChat(id){
  active = id; localStorage.setItem("nexus_vfinal28_active",id);
  $("view").innerHTML="";
  const chat = chats.find(c=>c.id===id);
  if(chat) {
    if(chat.messages.length === 0) showChips();
    chat.messages.forEach((m, idx) => renderMsg(m, idx, false)); 
    $("header-title").innerText = chat.title.toUpperCase();
  }
  renderList();
}

function filterChats() {
    const query = $("searchChats").value.toLowerCase();
    const list = $("chatList");
    list.innerHTML = "";
    
    chats.filter(c => {
        if(c.title.toLowerCase().includes(query)) return true;
        return c.messages.some(m => 
            (m.text && m.text.toLowerCase().includes(query)) || 
            (m.reply && m.reply.toLowerCase().includes(query))
        );
    }).forEach(c => {
        const d = document.createElement("div");
        d.className = `chat-item ${c.id === active ? 'active' : ''}`;
        d.innerHTML = `<span>${c.title}</span><button class="del-btn" onclick="deleteChat('${c.id}', event)">×</button>`;
        d.onclick = () => {
            loadChat(c.id);
            if(window.innerWidth <= 768) {
                $('sidebar').classList.remove('open');
                $('overlay').classList.remove('active');
            }
        };
        list.appendChild(d);
    });
}

function renderList(){ filterChats(); }

function save(){ localStorage.setItem("nexus_vfinal28_chats",JSON.stringify(chats)); }
function deleteChat(id, event){ 
  event.stopPropagation();
  chats = chats.filter(c=>c.id!==id); save(); renderList(); 
  if(chats.length) loadChat(chats[0].id); else newChat();

async function send(){
  const rawText = inputArea.value.trim(); if (!rawText) return;
  inputArea.value="";
  inputArea.style.height = "auto"; 
  $('wordCount').innerText = "0 words";
  
  const chips = $("startupChips"); if(chips) chips.remove();

  const chat = chats.find(c=>c.id===active);
  const user = {role:"user", text: rawText, time: getTime()};
  chat.messages.push(user);
  renderMsg(user, chat.messages.length - 1, false);

  if (chat.messages.length === 1) {
      chat.title = "Generating Title...";
      $("header-title").innerText = chat.title.toUpperCase();
  }

  const isImage = rawText.toLowerCase().startsWith("/image ");
  const isHImage = rawText.toLowerCase().startsWith("/himage ");

  if(isImage || isHImage){
    if(isGeneratingImage) {
        const tempMsg = document.createElement("div");
        tempMsg.className = "msg-container them text-mode";
        tempMsg.style.maxWidth = "85%";
        tempMsg.innerHTML = `<div class="msg" style="color: #ff4d00; border-color: #ff4d00; background: rgba(255, 77, 0, 0.1); padding: 12px;">⏳ Nexus is rendering an image. Please wait.</div>`;
        $("view").appendChild(tempMsg);
        $("view").scrollTop = $("view").scrollHeight;
        setTimeout(() => tempMsg.remove(), 4000); 
        return;
    }
      
    isGeneratingImage = true;
    const prefix = isImage ? "/image " : "/himage ";
    const prompt = rawText.substring(prefix.length).trim();
    const cleanPrompt = encodeURIComponent(prompt.replace(/[^a-zA-Z0-9 ]/g, ""));
    const randomSeed = Math.floor(Math.random() * 1000000);
    
    let imgUrl = img_p1 + img_p2 + "/prompt/" + cleanPrompt + "?width=1024&height=1024&seed=" + randomSeed + "&nologo=true";
    if(isHImage) imgUrl += `&model=flux`; 
    
    const replyText = isHImage ? `Generating High-Res Image: **${prompt}**` : `Generating Fast Image: **${prompt}**`;

    const botMsg = {role: "assistant", reply: replyText, img: imgUrl, time: getTime()};
    chat.messages.push(botMsg);
    renderMsg(botMsg, chat.messages.length - 1, false);
    save(); 
    
    if (chat.messages.length === 2 && chat.title === "Generating Title...") {
        autoTitleChat(chat.id, rawText);
    }
    return;
  }

  let cmds = {
      isTextCommand: rawText.toLowerCase().startsWith("/text "),
      isAdviseCommand: rawText.toLowerCase().startsWith("/advise "),
      isSearchCommand: rawText.toLowerCase().startsWith("/search "),
      isScriptCommand: rawText.toLowerCase().startsWith("/script ")
  };

  triggerBackend(chat, cmds);
}

async function triggerBackend(chat, cmds) {
  $("loader").style.display = "flex";
  try {
    const selectedModel = $("modelSelect").value;
    const targetModel = selectedModel === "multi" ? "llama-3.3-70b-versatile" : selectedModel;

    let currentMsgs = chat.messages.map(m => {
        let contentStr = m.text || m.reply;
        if(m.role === "user") {
            if(contentStr.toLowerCase().startsWith("/text ")) contentStr = contentStr.substring(6);
            else if(contentStr.toLowerCase().startsWith("/advise ")) contentStr = contentStr.substring(8);
            else if(contentStr.toLowerCase().startsWith("/search ")) contentStr = contentStr.substring(8);
            else if(contentStr.toLowerCase().startsWith("/script ")) contentStr = contentStr.substring(8);
        }
        return {role: m.role, content: contentStr};
    });

    let sysPrompt = globalInstructions || "You are Nexus Ultra, a highly advanced, logical, and precise AI assistant. Provide extremely accurate, well-formatted, and helpful responses.";

    if (useDeepThink) {
        sysPrompt += "\n\n[DEEP REASONING MODE ENABLED]: CRITICAL INSTRUCTION: You must engage in deep Chain-of-Thought reasoning. Break down the user's request step-by-step, analyze all constraints, and formulate a highly logical plan before providing the final answer. Ensure extreme precision, accuracy, and factual correctness.";
    }

    if(cmds.isTextCommand) {
        sysPrompt += "\n\nCRITICAL INSTRUCTION: You are generating a formal document. Output ONLY the requested document text. Do NOT include any conversational filler.";
    } else if (cmds.isAdviseCommand) {
        sysPrompt += "\n\nCRITICAL INSTRUCTION: You are acting as a highly analytical financial advisor. Provide expert-level analysis with bullet points. End your response with a disclaimer.";
    } else if (cmds.isSearchCommand) {
        sysPrompt += "\n\nCRITICAL INSTRUCTION: You are acting as a live web search assistant. Include sources wrapped exactly in this HTML structure: <details class='sources-wrap'><summary>🔗 View Sources</summary><ul><li><a href='URL_HERE' target='_blank'>Source Name</a></li></ul></details>";
    } else if (cmds.isScriptCommand) {
        sysPrompt += "\n\nCRITICAL INSTRUCTION: You are an expert developer. Output ONLY raw, working code for the requested script. Do NOT wrap the code in markdown blockticks (```). Do NOT include any conversational text, explanations, or greetings. Output raw code only.";
    }

    const res = await fetch(WORKER_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model: targetModel,
        messages: [
            {role: "system", content: sysPrompt},
            ...currentMsgs
        ]
      })
    });
    
    const data = await res.json();
    const bot = {
        role: "assistant", 
        reply: data.reply, 
        time: getTime(), 
        isTextMode: cmds.isTextCommand, 
        isAdviseMode: cmds.isAdviseCommand, 
        isSearchMode: cmds.isSearchCommand,
        isScriptMode: cmds.isScriptCommand
    };
    chat.messages.push(bot);
    save(); renderList(); 
    
    renderMsg(bot, chat.messages.length - 1, true); 
    
    if (chat.messages.length === 2 && chat.title === "Generating Title...") {
        let titlePrompt = chat.messages[0].text || "Interaction";
        autoTitleChat(chat.id, titlePrompt);
    }
    
  } catch(e) { 
    const err = {role:"assistant", reply:"Error connecting to Nexus.", time: getTime()};
    chat.messages.push(err); save(); renderMsg(err, chat.messages.length - 1, false);
  }
  finally { $("loader").style.display = "none"; }
}

function renderMsg(m, idx, shouldStream = false) {
  const container = document.createElement("div");
  container.className = "msg-container " + (m.role==="user" ? "me" : "them");
  
  if(m.isTextMode) container.classList.add("text-mode");
  if(m.isScriptMode) container.classList.add("script-mode");
  
  const bubble = document.createElement("div");
  bubble.className = "msg";
  
  if(m.img && m.role === "assistant") {
    const imgWrap = document.createElement('div');
    imgWrap.className = "img-wrapper";
    
    const loadingDiv = document.createElement('div');
    loadingDiv.className = "img-loading";
    loadingDiv.innerHTML = `<div style="display:flex; gap:5px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>Generating Image...</span>`;
    imgWrap.appendChild(loadingDiv);

    const img = document.createElement('img');
    img.className = "ai-img";
    img.style.display = "none"; 

    const dlBtn = document.createElement('button');
    dlBtn.className = "overlay-btn";
    dlBtn.innerHTML = "📥 Download";
    dlBtn.style.display = "none"; 
    dlBtn.onclick = (e) => {
        e.stopPropagation();
        downloadImage(m.img, "Nexus_Image_" + Date.now(), dlBtn);
    };

    img.onload = () => {
        loadingDiv.style.display = "none"; 
        img.style.display = "block";       
        dlBtn.style.display = "block";     
        $("view").scrollTop = $("view").scrollHeight; 
        isGeneratingImage = false; 
    };

    img.onerror = () => { 
        loadingDiv.style.display = 'none'; 
        imgWrap.innerHTML = `<br><em>[Image generation timed out. <a href="${m.img}" target="_blank" style="color:var(--accent)">Click here to view it directly</a>]</em>`;
        isGeneratingImage = false; 
    };

    img.src = m.img;

    imgWrap.appendChild(img);
    imgWrap.appendChild(dlBtn);
    bubble.appendChild(imgWrap);
    container.appendChild(bubble);
  } else {
    container.appendChild(bubble);
    
    if (shouldStream && m.role === "assistant") {
        let fullText = m.reply;
        let i = 0;
        let baseDelay = 101 - parseInt(currentSpeed);
        let speed = currentFlow === "raw" ? 5 : baseDelay; 
        
        bubble.innerHTML = currentFlow === "typewriter" ? "<span class='typing-cursor'></span>" : "";
        
        function type() {
            if(active !== chats.find(c => c.messages.includes(m))?.id) return; 

            if (i < fullText.length) {
                let charsToAdd = 1;
                if(currentFlow === "raw") charsToAdd = Math.floor(Math.random() * 5) + 3;
                else if(currentFlow === "smooth") charsToAdd = 3; 
                
                let oldStr = fullText.substring(0, i);
                let newStr = fullText.substring(i, i + charsToAdd);
                
                if(m.isScriptMode) {
                    let currentStr = fullText.substring(0, i + charsToAdd);
                    let langLabel = "CODE";
                    bubble.innerHTML = `<div class="code-wrapper"><div class="code-header"><span>${langLabel}</span></div><pre><code class="language-javascript">${currentStr.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre></div>` + (currentFlow === "typewriter" ? "<span class='typing-cursor'></span>" : "");
                } else {
                    if (currentFlow === "smooth") {
                        bubble.innerHTML = oldStr.replace(/\n/g, '<br>\n').replace(/</g, "&lt;").replace(/>/g, "&gt;") + `<span class="fade-text">${newStr.replace(/\n/g, '<br>\n').replace(/</g, "&lt;").replace(/>/g, "&gt;")}</span>`;
                    } else if (currentFlow === "typewriter") {
                        let currentStr = fullText.substring(0, i + charsToAdd);
                        bubble.innerHTML = currentStr.replace(/\n/g, '<br>\n').replace(/</g, "&lt;").replace(/>/g, "&gt;") + "<span class='typing-cursor'></span>";
                    } else {
                        let currentStr = fullText.substring(0, i + charsToAdd);
                        bubble.innerHTML = currentStr.replace(/\n/g, '<br>\n').replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    }
                }
                
                i += charsToAdd;
                $("view").scrollTop = $("view").scrollHeight;
                setTimeout(type, speed);
            } else {
                if(m.isScriptMode) {
                    let langLabel = "CODE";
                    bubble.innerHTML = `<div class="code-wrapper"><div class="code-header"><span>${langLabel}</span><button class="copy-btn" onclick="copyToClipboard(this)">Copy</button></div><pre><code class="language-javascript">${fullText.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre></div>`;
                } else {
                    bubble.innerHTML = md(fullText); 
                }
                container.querySelectorAll('pre code').forEach((block) => { hljs.highlightElement(block); });
                $("view").scrollTop = $("view").scrollHeight;
                if(meta) meta.style.display = "flex"; 
            }
        }
        type();
    } else {
        if(m.isScriptMode && m.role === "assistant") {
            let langLabel = "CODE";
            bubble.innerHTML = `<div class="code-wrapper"><div class="code-header"><span>${langLabel}</span><button class="copy-btn" onclick="copyToClipboard(this)">Copy</button></div><pre><code class="language-javascript">${m.reply.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre></div>`;
        } else {
            bubble.innerHTML = m.role === "user" ? m.text : md(m.reply);
        }
        container.querySelectorAll('pre code').forEach((block) => { hljs.highlightElement(block); });
    }
  }

  const meta = document.createElement("div");
  meta.className = "msg-meta";
  meta.innerHTML = `<span>${m.time || ''}</span>`;
  
  if (shouldStream && m.role === "assistant" && !m.img) {
      meta.style.display = "none";
  }
  
  if(m.role === "assistant" && !m.img) {
      if(m.isTextMode) {
          const docCopyBtn = document.createElement("button");
          docCopyBtn.className = "action-btn"; docCopyBtn.innerHTML = "📋 Copy";
          docCopyBtn.onclick = () => copyDocumentText(docCopyBtn, m.reply);
          meta.appendChild(docCopyBtn);
          
          const docExportBtn = document.createElement("button");
          docExportBtn.className = "action-btn"; docExportBtn.innerHTML = "📥 Export";
          docExportBtn.onclick = () => exportDocument(m.reply, chats.find(c=>c.id===active).title);
          meta.appendChild(docExportBtn);

          const humanizeBtn = document.createElement("button");
          humanizeBtn.className = "action-btn"; humanizeBtn.innerHTML = "🧑‍💻 Humanize (Local)";
          humanizeBtn.onclick = () => { 
              humanizeDocument(idx, humanizeBtn); 
          };
          meta.appendChild(humanizeBtn);
          
          // ✨ THE CLEVERHUMANIZER BUTTON (Now Auto-Copies)
          const premiumBtn = document.createElement("button");
          premiumBtn.className = "action-btn premium"; 
          premiumBtn.innerHTML = "✨ 100% Bypass";
          
          const h_link1 = "https://";
          const h_link2 = "cleverhumanizer";
          const h_link3 = ".ai/";
          
          premiumBtn.onclick = () => { 
              // 1. Format the text nicely so it preserves paragraphs
              const formattedText = m.reply.replace(/\r?\n/g, "\r\n");
              
              // 2. Try the modern clipboard API, fallback to text area hack if browser blocks it
              if (navigator.clipboard && window.isSecureContext) {
                  navigator.clipboard.writeText(formattedText);
              } else {
                  const textarea = document.createElement("textarea");
                  textarea.value = formattedText;
                  document.body.appendChild(textarea);
                  textarea.select();
                  document.execCommand("copy");
                  document.body.removeChild(textarea);
              }
              
              // 3. Open CleverHumanizer 
              window.open(h_link1 + h_link2 + h_link3, "_blank", "noopener,noreferrer"); 
              
              // 4. Update the button text to show it worked!
              const originalText = premiumBtn.innerHTML;
              premiumBtn.innerHTML = "✓ Copied! Opening...";
              setTimeout(() => premiumBtn.innerHTML = originalText, 2500);
          };
          meta.appendChild(premiumBtn);
      }
      
      if(m.isScriptMode) {
          const scriptDlBtn = document.createElement("button");
          scriptDlBtn.className = "action-btn"; scriptDlBtn.innerHTML = "💾 Download Script";
          scriptDlBtn.onclick = () => downloadScript(m.reply, ".js"); 
          meta.appendChild(scriptDlBtn);
      }

      const chat = chats.find(c=>c.id===active);
      if(idx === chat.messages.length - 1) {
          const regenBtn = document.createElement("button");
          regenBtn.className = "action-btn"; regenBtn.innerHTML = "🔄 Retry";
          regenBtn.onclick = () => regenerateMsg(idx);
          meta.appendChild(regenBtn);
      }
  }
  
  container.appendChild(meta);
  $("view").appendChild(container);
  $("view").scrollTop = $("view").scrollHeight;
}

function toggleCollapsible() {
    const content = $("settingsContent");
    content.style.display = content.style.display === "block" ? "none" : "block";
}
function handleSidebarToggle() {
    if (window.innerWidth <= 768) { $('sidebar').classList.toggle('open'); $('overlay').classList.toggle('active'); } 
    else { $('sidebar').classList.toggle('collapsed'); }
}
function toggleSidebar() {
    $('sidebar').classList.remove('open');
    $('overlay').classList.remove('active');
}
function applyTheme(t){ document.body.setAttribute('data-theme', t); localStorage.setItem("nx_theme", t); }
function toggleTheme(){ document.body.classList.toggle("light"); localStorage.setItem("nx_mode", document.body.classList.contains("light")?"L":"D"); }

applyTheme(localStorage.getItem("nx_theme")||"default");
if(localStorage.getItem("nx_mode")==="L") document.body.classList.add("light");

function handleFileUpload(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { 
      inputArea.value += `\n[File: ${file.name}]\n${e.target.result}\n`; 
      inputArea.dispatchEvent(new Event('input')); 
  };
  reader.readAsText(file);
}
