<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nexus Ultra | Pro Developer Edition</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#050607">
<link rel="manifest" href='data:application/manifest+json,{
  "name": "Nexus Ultra",
  "short_name": "Nexus",
  "display": "standalone",
  "start_url": ".",
  "background_color": "#050607",
  "theme_color": "#00ff88",
  "icons": [{"src": "icon.png", "sizes": "192x192", "type": "image/png"}, {"src": "icon.png", "sizes": "512x512", "type": "image/png"}]
}'>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
/* ========== 1. ADVANCED LIQUID UI ENGINE ========== */
:root {
  --accent: #00ff88; --bg: #050607; --glass: rgba(255, 255, 255, 0.03);
  --glass-heavy: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.1);
  --text: #ffffff; --text-muted: #888888; --grad-1: #004d33; --grad-2: #002244;
}
[data-theme="frost"] { --accent: #00d9ff; --grad-1: #002b36; --grad-2: #1a1a2e; }
[data-theme="ember"] { --accent: #ff4d00; --grad-1: #330d00; --grad-2: #1a0a00; }
[data-theme="cyber"] { --accent: #ff00ea; --grad-1: #220033; --grad-2: #050505; }

body.light { 
  --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.7); --glass-heavy: rgba(255, 255, 255, 0.95); 
  --border: rgba(0, 0, 0, 0.1); --text: #0f172a; --text-muted: #64748b; 
  --grad-1: #e2e8f0; --grad-2: #cbd5e1; 
}
body.light[data-theme="default"] { --accent: #10b981; --grad-1: #d1fae5; --grad-2: #a7f3d0; }
body.light[data-theme="frost"] { --accent: #0284c7; --grad-1: #e0f2fe; --grad-2: #bae6fd; }
body.light[data-theme="ember"] { --accent: #ea580c; --grad-1: #ffedd5; --grad-2: #fed7aa; }
body.light[data-theme="cyber"] { --accent: #db2777; --grad-1: #fce7f3; --grad-2: #fbcfe8; }

* { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; transition: background 0.3s, border 0.3s, color 0.3s; }
body, html { margin: 0; height: 100dvh; background: var(--bg); color: var(--text); overflow: hidden; position: fixed; width: 100%; }

#liquid-bg { position: fixed; inset: -10%; z-index: -1; background-image: radial-gradient(circle at 20% 30%, var(--grad-1), transparent 40%), radial-gradient(circle at 80% 70%, var(--grad-2), transparent 50%); filter: blur(60px); animation: drift 20s infinite alternate ease-in-out; }
@keyframes drift { from { transform: scale(1); } to { transform: scale(1.1); } }

.app { display: flex; height: 100dvh; padding: 10px; gap: 10px; backdrop-filter: blur(15px); }

/* ========== 2. SIDEBAR ========== */
.sidebar { 
  width: 300px; background: var(--glass); backdrop-filter: blur(40px); border-radius: 24px; border: 1px solid var(--border); 
  display: flex; flex-direction: column; z-index: 1000; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), width 0.4s, opacity 0.4s; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
.sidebar.collapsed { width: 0; padding: 0; margin: 0; border: none; opacity: 0; pointer-events: none; }
@media (max-width: 768px) {
  .sidebar { position: fixed; left: 10px; top: 10px; bottom: 10px; transform: translateX(-115%); width: 280px; opacity: 1; }
  .sidebar.open { transform: translateX(0); width: 280px; opacity: 1; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
  .sidebar.collapsed { transform: translateX(-115%); width: 280px; opacity: 1; }
}

.sidebar-header { padding: 25px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
.themed-select { background: var(--glass-heavy); color: var(--accent); border: 1px solid var(--accent); border-radius: 8px; padding: 6px; font-size: 0.75rem; cursor: pointer; outline: none; }
.themed-select option { background: var(--bg); color: var(--text); }
.collapsible { background: var(--glass-heavy); border: none; color: var(--accent); cursor: pointer; padding: 12px 20px; width: 100%; text-align: left; font-size: 0.8rem; font-weight: 800; border-top: 1px solid var(--border); }
.content { padding: 15px; display: none; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); }
body.light .content { background: rgba(0,0,0,0.03); }
.instruction-box { width: 100%; background: var(--glass); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px; font-size: 0.75rem; resize: none; min-height: 80px; outline: none; }
.export-btn { background: var(--glass-heavy); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px; font-size: 0.75rem; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
.export-btn:hover { border-color: var(--accent); color: var(--accent); }

.chat-list { flex: 1; overflow-y: auto; padding: 10px; }
.chat-item { padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; font-size: 0.85rem; background: var(--glass); border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; }
.chat-item.active { border-color: var(--accent); background: var(--glass-heavy); color: var(--accent); font-weight: 600; }
.del-btn { background: none; border: none; color: inherit; opacity: 0.3; cursor: pointer; font-size: 1.2rem; }
.new-chat { margin: 15px; padding: 12px; background: var(--accent); color: #fff; border-radius: 14px; text-align: center; font-weight: 800; cursor: pointer; }
body.light .new-chat { color: #fff; }

/* ========== 3. MAIN APP AREA ========== */
.main { flex: 1; background: var(--glass); backdrop-filter: blur(40px); border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.05); gap: 10px; }
body.light header { background: rgba(255,255,255,0.2); }
.header-btn { background: var(--glass-heavy); border: 1px solid var(--border); border-radius: 10px; color: var(--accent); padding: 5px 12px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; gap: 5px; }

/* ========== 4. CHAT VIEW & BUBBLES ========== */
#view { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
.msg-container { display: flex; flex-direction: column; max-width: 85%; animation: msgIn .2s ease-out; }
.msg-container.me { align-self: flex-end; align-items: flex-end; }
.msg-container.them { align-self: flex-start; align-items: flex-start; }

.msg { padding: 12px 18px; border-radius: 20px; line-height: 1.6; font-size: 0.95rem; word-wrap: break-word; position: relative; }
.me .msg { background: var(--accent); color: #fff; font-weight: 600; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.them .msg { background: var(--glass-heavy); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

.msg-container.text-mode { max-width: 100%; width: 100%; align-self: center; }
.text-mode .msg { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px; padding: 25px; width: 100%; font-family: 'Inter', sans-serif; box-shadow: inset 0 0 20px rgba(0,0,0,0.1); }
body.light .text-mode .msg { background: rgba(255,255,255,0.6); box-shadow: inset 0 0 20px rgba(255,255,255,0.5); }

/* User Attached Images */
.user-attached-img { max-width: 200px; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border); }

/* Script Mode Additions */
.script-mode .msg { background: rgba(0,255,136,0.05); border: 1px solid var(--accent); padding: 0; overflow: hidden; border-radius: 12px; }
.script-mode .msg pre { margin: 0; border-radius: 0; }

.sources-wrap { margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px; font-size: 0.85rem; }
.sources-wrap summary { cursor: pointer; color: var(--accent); font-weight: 700; list-style: none; display: flex; align-items: center; gap: 5px; }
.sources-wrap summary::-webkit-details-marker { display: none; }
.sources-wrap ul { padding-left: 20px; margin-top: 10px; margin-bottom: 0; }
.sources-wrap li { margin-bottom: 5px; }
.sources-wrap a { color: #00d9ff; text-decoration: none; word-break: break-all; }
.sources-wrap a:hover { text-decoration: underline; }
.sources-wrap br { display: none; }

.msg-meta { font-size: 0.65rem; color: var(--text-muted); margin-top: 5px; display: flex; gap: 10px; align-items: center; }
.action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.75rem; padding: 2px 5px; display: flex; align-items: center; gap: 4px; transition: 0.2s; }
.action-btn:hover { color: var(--accent); }

.chips-wrap { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: auto; padding-bottom: 20px; }
.chip { background: var(--glass-heavy); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; border-radius: 100px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
.chip:hover { border-color: var(--accent); color: var(--accent); }

/* Images & Loading States */
.img-wrapper { position: relative; margin-top: 10px; display: inline-block; max-width: 100%; width: 100%; min-width: 250px; }
.ai-img { width: 100%; max-width: 512px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: block; transition: opacity 0.3s ease; }
.img-loading { padding: 50px 20px; text-align: center; background: var(--glass-heavy); border-radius: 12px; border: 1px dashed var(--accent); color: var(--accent); font-weight: 600; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 15px; max-width: 512px; }

.msg strong { font-weight: 800; }
.msg blockquote { border-left: 3px solid var(--accent); margin: 10px 0; padding-left: 10px; opacity: 0.8; }
.code-wrapper { position: relative; margin: 10px 0; }
.overlay-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 6px; padding: 6px 10px; font-size: 0.75rem; cursor: pointer; z-index: 10; backdrop-filter: blur(5px); transition: 0.2s; }
.overlay-btn:hover { background: var(--accent); color: #000; }
.msg pre { background: rgba(0,0,0,0.3); padding: 35px 15px 15px; border-radius: 12px; overflow-x: auto; margin: 0; }
body.light .msg pre { background: rgba(0,0,0,0.05); }
.msg code { font-family: 'Consolas', monospace; font-size: 0.85em; }
p code { background: rgba(0,0,0,0.2); padding: 2px 5px; border-radius: 6px; font-size: 0.9em; }

@keyframes msgIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
.loader-wrap { display: flex; align-items: center; gap: 6px; padding: 10px 25px; display: none; }
.dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { transform: scale(0.6); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 1; } }

/* ========== 5. FOOTER & INPUT ========== */
footer { padding: 15px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }
.word-count { font-size: 0.65rem; color: var(--text-muted); text-align: right; padding-right: 15px; }
.input-row { display: flex; gap: 8px; background: var(--glass-heavy); padding: 8px 10px 8px 15px; border-radius: 24px; border: 1px solid var(--border); align-items: flex-end; }

textarea#input { 
  flex: 1; background: none; border: none; outline: none; color: inherit; font-size: 1rem; 
  resize: none; min-height: 24px; max-height: 150px; overflow-y: auto; padding: 2px 0; margin-bottom: 4px; line-height: 1.4;
}
.circle-btn { background: var(--accent); color: #fff; border-radius: 50%; width: 36px; height: 36px; border: none; cursor: pointer; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.attach-btn { background: transparent; border: none; color: var(--text-muted); opacity: 0.6; cursor: pointer; font-size: 1.2rem; padding: 0 5px; margin-bottom: 4px; transition: 0.2s; }
.attach-btn:hover { opacity: 1; color: var(--accent); }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 950; backdrop-filter: blur(5px); }
.overlay.active { display: block; }

/* ========== 6. MOBILE RESPONSIVE OVERRIDES ========== */
@media (max-width: 768px) {
  .app { padding: 0; gap: 0; }
  .main { border-radius: 0; border: none; }
  .sidebar { 
      position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); 
      width: 85%; max-width: 320px; border-radius: 0 24px 24px 0; 
      border-left: none; border-top: none; border-bottom: none; opacity: 1;
  }
  .sidebar.open { transform: translateX(0); box-shadow: 0 0 50px rgba(0,0,0,0.8); }
  .sidebar.collapsed { transform: translateX(-100%); }
  
  header { padding: 10px; }
  .header-btn { padding: 5px 10px; font-size: 1.1rem; }
  #modelSelect { max-width: 140px; font-size: 0.7rem; padding: 6px 4px; }
  #header-title { display: none; } 
  
  #view { padding: 15px 10px; gap: 15px; }
  .msg-container { max-width: 95%; }
  .msg { padding: 10px 14px; font-size: 0.9rem; }
  .text-mode .msg { padding: 15px; }
  
  footer { padding: 10px; }
  .input-row { padding: 6px 8px 6px 12px; }
  textarea#input { font-size: 0.95rem; }
  .circle-btn, .attach-btn { width: 34px; height: 34px; margin-bottom: 2px; }
  
  .chips-wrap { gap: 6px; }
  .chip { font-size: 0.75rem; padding: 6px 12px; }
}
</style>
</head>

<body>
<div id="liquid-bg"></div>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">NEXUS</div>
    
    <button class="collapsible" onclick="toggleCollapsible()">⚙ SETTINGS & MEMORY</button>
    <div class="content" id="settingsContent">
        <label style="font-size: 0.6rem; opacity: 0.6; color: var(--text);">SYSTEM INSTRUCTIONS</label>
        <textarea id="systemPrompt" class="instruction-box" placeholder="Memory instructions..." oninput="updateMemory()"></textarea>
        
        <div style="margin-top:10px; display:flex; gap:5px; align-items:center;">
            <select id="themeSelect" class="themed-select" onchange="applyTheme(this.value)" style="flex:1;">
                <option value="default">Forest</option>
                <option value="frost">Arctic</option>
                <option value="ember">Vulcan</option>
                <option value="cyber">Royal</option>
            </select>
            <button onclick="toggleTheme()" style="background:var(--glass-heavy); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px; font-size:0.8rem; cursor:pointer;">☀</button>
        </div>
        
        <button class="export-btn" onclick="exportMemory()">💾 Export Memory Backup</button>
        <div id="memNotify" style="font-size: 0.6rem; color: var(--accent); margin-top: 5px; display: none;">Saved.</div>
    </div>

    <div class="chat-list" id="chatList"></div>
    <div class="new-chat" onclick="newChat()">＋ New Transmission</div>
  </aside>

  <main class="main">
    <header>
      <div style="display:flex; align-items:center; gap:8px; flex-shrink: 0;">
        <button class="header-btn" onclick="handleSidebarToggle()">☰</button>
      </div>
      
      <select id="modelSelect" class="themed-select" style="flex: 1; max-width: 220px;">
        <option value="multi">Multi-GPT (Vision)</option>
        <option value="llama-3.3-70b-versatile">LLaMA 3.3 (Smart)</option>
        <option value="llama-3.1-8b-instant">LLaMA 3.1 (Fast)</option>
        <option value="qwen/qwen-2.5-72b-instruct:free">Qwen 2.5 (Logic)</option>
      </select>

      <span id="header-title" style="font-weight:800; color:var(--accent); font-size:0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px;">READY_</span>
    </header>

    <div id="view"></div>

    <div class="loader-wrap" id="loader">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <footer>
      <div class="word-count" id="wordCount">0 words</div>
      <div class="input-row">
        <input type="file" id="fileInput" style="display:none" onchange="handleFileUpload(this)" accept="image/*,.txt,.json,.csv,.js,.py,.html,.css">
        <button class="attach-btn" onclick="$('fileInput').click()" title="Attach File/Image">📎</button>
        <textarea id="input" rows="1" placeholder="Message, /read, /script, /image, /himage..." autocomplete="off"></textarea>
        <button class="circle-btn" onclick="send()">↑</button>
      </div>
    </footer>
  </main>
</div>

<script>
const $ = id => document.getElementById(id);

/* ===== 1. TEXTAREA AUTO-RESIZE & WORD COUNT ===== */
const inputArea = $('input');
inputArea.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
    const words = this.value.trim().split(/\s+/).filter(w => w.length > 0).length;
    $('wordCount').innerText = words + (words === 1 ? " word" : " words");
});
inputArea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

/* ===== 2. ENHANCED MARKDOWN & COPY CODE ===== */
function md(t){
  let parsed = t
    .replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
        return `<div class="code-wrapper">
                  <button class="overlay-btn" onclick="copyToClipboard(this)">Copy</button>
                  <pre><code class="language-${lang}">${code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
                </div>`;
    })
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/^> (.+)$/gm, "<blockquote>$1</blockquote>") // Blockquotes
    .replace(/`(.+?)`/g,"<code>$1</code>")
    .replace(/\n/g,"<br>");
  return parsed;
}

function copyToClipboard(btn) {
    const code = btn.nextElementSibling.innerText;
    navigator.clipboard.writeText(code);
    btn.innerText = "Copied!";
    setTimeout(() => btn.innerText = "Copy", 2000);
}

function downloadScript(code, ext) {
    // Strip markdown formatting if the model still accidentally included it
    const cleanCode = code.replace(/```[a-z]*\n?/g, '').replace(/```/g, '');
    const blob = new Blob([cleanCode], {type: "text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "nexus_script_" + Date.now() + ext;
    a.click();
}

async function downloadImage(imgUrl, fileName, btn) {
    btn.innerText = "⏳ Downloading...";
    try {
        const response = await fetch(imgUrl);
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName + '.jpg';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
        btn.innerText = "✓ Saved";
        setTimeout(() => btn.innerText = "📥 Download", 2000);
    } catch(e) {
        window.open(imgUrl, '_blank');
        btn.innerText = "📥 Download";
    }
}

/* ===== 3. STATE & TIMESTAMPS ===== */
let chats = JSON.parse(localStorage.getItem("nexus_v21_chats")||"[]");
let active = localStorage.getItem("nexus_v21_active");
let globalInstructions = localStorage.getItem("nexus_memory") || "";
let isGeneratingImage = false; 
let pendingBase64Image = null; // Holds image data for vision requests

if (!chats.length) newChat(true);
$("systemPrompt").value = globalInstructions;
renderList();
loadChat(active || chats[0].id);

function getTime() {
    return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

function newChat(isInit = false){
  const id = Date.now().toString();
  chats.unshift({id,title:"New Chat",messages:[]});
  save(); renderList(); loadChat(id);
  
  if(!isInit && window.innerWidth <= 768) {
      $('sidebar').classList.remove('open');
      $('overlay').classList.remove('active');
  }
}

function loadChat(id){
  active = id; localStorage.setItem("nexus_v21_active",id);
  $("view").innerHTML="";
  const chat = chats.find(c=>c.id===id);
  if(chat) {
    if(chat.messages.length === 0) showChips();
    chat.messages.forEach((m, idx) => renderMsg(m, idx));
    $("header-title").innerText = chat.title.toUpperCase();
  }
  renderList();
}

function renderList(){
  const list = $("chatList"); list.innerHTML="";
  chats.forEach(c=>{
    const d = document.createElement("div");
    d.className="chat-item"+(c.id===active?" active":"");
    d.innerHTML = `${c.title} <button class="del-btn" onclick="event.stopPropagation(); deleteChat('${c.id}')">×</button>`;
    d.onclick = () => {
        loadChat(c.id);
        if(window.innerWidth <= 768) {
            $('sidebar').classList.remove('open');
            $('overlay').classList.remove('active');
        }
    };
    list.appendChild(d);
  });
}

function save(){ localStorage.setItem("nexus_v21_chats",JSON.stringify(chats)); }
function deleteChat(id){ 
  chats = chats.filter(c=>c.id!==id); save(); renderList(); 
  if(chats.length) loadChat(chats[0].id); else newChat(); 
}

function updateMemory() {
    globalInstructions = $("systemPrompt").value;
    localStorage.setItem("nexus_memory", globalInstructions);
    $("memNotify").style.display = "block";
    setTimeout(() => { $("memNotify").style.display = "none"; }, 2000);
}

function exportMemory() {
    const memoryContent = $("systemPrompt").value || "No system instructions saved.";
    const blob = new Blob([memoryContent], {type: "text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "nexus_memory_backup.txt";
    a.click();
}

/* ===== 4. QUICK ACTION CHIPS ===== */
function showChips() {
    const d = document.createElement("div");
    d.className = "chips-wrap";
    d.id = "startupChips";
    const prompts = [
        "/read https://en.wikipedia.org/wiki/AI Summarize this",
        "/script python script to scrape a website", 
        "/himage a futuristic neon city",
        "Explain quantum computing"
    ];
    prompts.forEach(p => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.innerText = p;
        btn.onclick = () => { inputArea.value = p; send(); };
        d.appendChild(btn);
    });
    $("view").appendChild(d);
}

/* ===== 5. TEXT DOCUMENT EXPORT ===== */
function exportDocument(textToExport, title) {
    let content = `<html><head><meta charset="utf-8"></head><body>${textToExport.replace(/\n/g, '<br>')}</body></html>`;
    const blob = new Blob(['\ufeff', content], {type: 'application/msword'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_document.doc`;
    a.click();
}

/* ===== 6. AUTO-TITLING ENGINE ===== */
async function autoTitleChat(chatId, firstPrompt) {
    try {
        const res = await fetch("https://hidden-breeze-d81b.minedabstudios.workers.dev/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                model: "llama-3.1-8b-instant", // Utilizing the fast model for rapid title generation
                messages: [
                    {role: "system", content: "You are an automatic titling bot. Summarize the user's input into exactly 2 or 3 words. Do NOT use quotes, punctuation, or any conversational filler. Only output the 2-3 word title."},
                    {role: "user", content: firstPrompt}
                ]
            })
        });
        const data = await res.json();
        const chat = chats.find(c => c.id === chatId);
        if (chat && data.reply) {
            chat.title = data.reply.trim().substring(0, 25);
            save(); renderList();
            if (active === chatId) $("header-title").innerText = chat.title.toUpperCase();
        }
    } catch(e) {
        console.warn("Auto-titling failed.", e);
    }
}

/* ===== 7. REGENERATE ===== */
function regenerateMsg(idx) {
    const chat = chats.find(c=>c.id===active);
    if(chat.messages[idx].role === "assistant") {
        let cmds = {
            isTextCommand: chat.messages[idx].isTextMode,
            isAdviseCommand: chat.messages[idx].isAdviseMode,
            isSearchCommand: chat.messages[idx].isSearchMode,
            isScriptCommand: chat.messages[idx].isScriptMode
        };
        chat.messages.splice(idx, 1);
        save(); loadChat(active);
        triggerBackend(chat, cmds);
    }
}

/* ===== 8. CORE SEND & FETCH LOGIC ===== */
async function send(){
  let rawText = inputArea.value.trim(); if (!rawText && !pendingBase64Image) return;
  inputArea.value="";
  inputArea.style.height = "auto"; 
  $('wordCount').innerText = "0 words";
  
  const chips = $("startupChips"); if(chips) chips.remove();

  const chat = chats.find(c=>c.id===active);
  
  let userMsg = {role:"user", text: rawText, time: getTime()};
  
  // Attach base64 image if uploaded
  if(pendingBase64Image) {
      userMsg.imageData = pendingBase64Image;
      pendingBase64Image = null; // Clear queue
  }

  chat.messages.push(userMsg);
  renderMsg(userMsg, chat.messages.length - 1);

  // Trigger auto-title if it's the very first message
  if (chat.messages.length === 1) {
      chat.title = "Generating Title...";
      $("header-title").innerText = chat.title.toUpperCase();
      autoTitleChat(chat.id, rawText);
  }

  // COMMAND: IMAGE INTERCEPTORS
  const isImage = rawText.toLowerCase().startsWith("/image ");
  const isHImage = rawText.toLowerCase().startsWith("/himage ");

  if(isImage || isHImage){
    if(isGeneratingImage) {
        const tempMsg = document.createElement("div");
        tempMsg.className = "msg-container them text-mode";
        tempMsg.style.maxWidth = "85%";
        tempMsg.innerHTML = `<div class="msg" style="color: #ff4d00; border-color: #ff4d00; background: rgba(255, 77, 0, 0.1); padding: 12px;">⏳ Nexus is currently rendering an image. Please wait.</div>`;
        $("view").appendChild(tempMsg);
        $("view").scrollTop = $("view").scrollHeight;
        setTimeout(() => tempMsg.remove(), 4000); 
        return;
    }
      
    isGeneratingImage = true;
    const prefix = isImage ? "/image " : "/himage ";
    const prompt = rawText.substring(prefix.length).trim();
    const cleanPrompt = encodeURIComponent(prompt.replace(/[^a-zA-Z0-9 ]/g, ""));
    const randomSeed = Math.floor(Math.random() * 1000000);
    
    let imgUrl = `https://image.pollinations.ai/prompt/${cleanPrompt}?width=1024&height=1024&seed=${randomSeed}&nologo=true`;
    if(isHImage) imgUrl += `&model=flux`; 
    
    const replyText = isHImage ? `Generating High-Res Image: **${prompt}**` : `Generating Fast Image: **${prompt}**`;

    const botMsg = {role: "assistant", reply: replyText, img: imgUrl, time: getTime()};
    chat.messages.push(botMsg);
    renderMsg(botMsg, chat.messages.length - 1);
    save(); return;
  }

  // COMMAND: /read (URL SCRAPING)
  if(rawText.toLowerCase().startsWith("/read ")) {
      const urlMatch = rawText.match(/https?:\/\/[^\s]+/);
      if(urlMatch) {
          const url = urlMatch[0];
          $("loader").style.display = "flex";
          try {
              // Free public CORS proxy to grab webpage text
              const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
              const resp = await fetch(proxyUrl);
              const data = await resp.json();
              
              // Strip HTML to get pure text
              const doc = new DOMParser().parseFromString(data.contents, 'text/html');
              const text = doc.body.textContent || "";
              
              // Attach scraped data invisibly to the message for the backend
              chat.messages[chat.messages.length - 1].hiddenContext = `\n\n[Context Scraped from ${url}]:\n${text.substring(0, 15000)}`;
          } catch(e) {
              const err = {role:"assistant", reply:`Could not scrape the URL: ${url}`, time: getTime()};
              chat.messages.push(err); renderMsg(err, chat.messages.length - 1); save();
              $("loader").style.display = "none";
              return;
          }
      }
  }

  let cmds = {
      isTextCommand: rawText.toLowerCase().startsWith("/text "),
      isAdviseCommand: rawText.toLowerCase().startsWith("/advise "),
      isSearchCommand: rawText.toLowerCase().startsWith("/search "),
      isScriptCommand: rawText.toLowerCase().startsWith("/script ")
  };

  triggerBackend(chat, cmds);
}

async function triggerBackend(chat, cmds) {
  $("loader").style.display = "flex";
  try {
    const selectedModel = $("modelSelect").value;
    // Defaulting multi to a vision capable model if possible
    const targetModel = selectedModel === "multi" ? "llama-3.2-90b-vision-preview" : selectedModel; 

    let currentMsgs = chat.messages.map(m => {
        let contentStr = m.text || m.reply;
        if(m.role === "user") {
            if(contentStr.toLowerCase().startsWith("/text ")) contentStr = contentStr.substring(6);
            else if(contentStr.toLowerCase().startsWith("/advise ")) contentStr = contentStr.substring(8);
            else if(contentStr.toLowerCase().startsWith("/search ")) contentStr = contentStr.substring(8);
            else if(contentStr.toLowerCase().startsWith("/read ")) contentStr = contentStr.substring(6);
            else if(contentStr.toLowerCase().startsWith("/script ")) contentStr = contentStr.substring(8);
            
            // Append hidden scraped context if it exists
            if(m.hiddenContext) contentStr += m.hiddenContext;
        }

        // Handle Vision Payload Formatting
        if(m.role === "user" && m.imageData) {
            return {
                role: m.role,
                content: [
                    { type: "text", text: contentStr || "Please analyze this image." },
                    { type: "image_url", image_url: { url: m.imageData } }
                ]
            };
        }

        return {role: m.role, content: contentStr};
    });

    let sysPrompt = globalInstructions;
    if(cmds.isTextCommand) {
        sysPrompt += "\n\nCRITICAL INSTRUCTION: You are generating a formal document. Output ONLY the requested document text. Do NOT include any conversational filler.";
    } else if (cmds.isAdviseCommand) {
        sysPrompt += "\n\nCRITICAL INSTRUCTION: You are acting as a highly analytical financial advisor. Provide expert-level analysis with bullet points. End your response with a disclaimer.";
    } else if (cmds.isSearchCommand) {
        sysPrompt += "\n\nCRITICAL INSTRUCTION: You are acting as a live web search assistant. Include sources wrapped exactly in this HTML structure: <details class='sources-wrap'><summary>🔗 View Sources</summary><ul><li><a href='URL_HERE' target='_blank'>Source Name</a></li></ul></details>";
    } else if (cmds.isScriptCommand) {
        sysPrompt += "\n\nCRITICAL INSTRUCTION: You are an expert developer. Output ONLY raw, working code for the requested script. Do NOT wrap the code in markdown blockticks (```). Do NOT include any conversational text, explanations, or greetings. Output raw code only.";
    }

    const res = await fetch("[https://hidden-breeze-d81b.minedabstudios.workers.dev/](https://hidden-breeze-d81b.minedabstudios.workers.dev/)",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model: targetModel,
        messages: [
            {role: "system", content: sysPrompt},
            ...currentMsgs
        ]
      })
    });
    const data = await res.json();
    const bot = {
        role: "assistant", 
        reply: data.reply, 
        time: getTime(), 
        isTextMode: cmds.isTextCommand, 
        isAdviseMode: cmds.isAdviseCommand, 
        isSearchMode: cmds.isSearchCommand,
        isScriptMode: cmds.isScriptCommand
    };
    chat.messages.push(bot);
    save(); renderList(); loadChat(active); 
  } catch(e) { 
    const err = {role:"assistant", reply:"Error connecting to Nexus.", time: getTime()};
    chat.messages.push(err); save(); loadChat(active);
  }
  finally { $("loader").style.display = "none"; }
}

function renderMsg(m, idx){
  const container = document.createElement("div");
  container.className = "msg-container " + (m.role==="user" ? "me" : "them");
  
  if(m.isTextMode) container.classList.add("text-mode");
  if(m.isScriptMode) container.classList.add("script-mode");
  
  const bubble = document.createElement("div");
  bubble.className = "msg";
  
  // Script mode handles raw text to avoid markdown parsing breaking the raw code format
  if(m.isScriptMode && m.role === "assistant") {
      bubble.innerHTML = `<div class="code-wrapper"><button class="overlay-btn" onclick="copyToClipboard(this)">Copy</button><pre><code class="language-javascript">${m.reply.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre></div>`;
  } else {
      bubble.innerHTML = m.role === "user" ? m.text : md(m.reply);
  }

  // Show user attached image
  if(m.role === "user" && m.imageData) {
      const uImg = document.createElement('img');
      uImg.src = m.imageData;
      uImg.className = "user-attached-img";
      bubble.appendChild(uImg);
  }
  
  // Custom Smooth Image Generation Loading Logic
  if(m.img && m.role === "assistant") {
    const imgWrap = document.createElement('div');
    imgWrap.className = "img-wrapper";
    
    const loadingDiv = document.createElement('div');
    loadingDiv.className = "img-loading";
    loadingDiv.innerHTML = `<div style="display:flex; gap:5px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>Generating Image...</span>`;
    imgWrap.appendChild(loadingDiv);

    const img = document.createElement('img');
    img.className = "ai-img";
    img.style.display = "none"; 

    const dlBtn = document.createElement('button');
    dlBtn.className = "overlay-btn";
    dlBtn.innerHTML = "📥 Download";
    dlBtn.style.display = "none"; 
    dlBtn.onclick = (e) => {
        e.stopPropagation();
        downloadImage(m.img, "Nexus_Image_" + Date.now(), dlBtn);
    };

    img.onload = () => {
        loadingDiv.style.display = "none"; 
        img.style.display = "block";       
        dlBtn.style.display = "block";     
        $("view").scrollTop = $("view").scrollHeight; 
        isGeneratingImage = false; 
    };

    img.onerror = () => { 
        loadingDiv.style.display = 'none'; 
        imgWrap.innerHTML = `<br><em>[Image generation timed out. <a href="${m.img}" target="_blank" style="color:var(--accent)">Click here to view it directly</a>]</em>`;
        isGeneratingImage = false; 
    };

    img.src = m.img;

    imgWrap.appendChild(img);
    imgWrap.appendChild(dlBtn);
    bubble.appendChild(imgWrap);
  }

  container.appendChild(bubble);

  // Apply Syntax Highlighting to any code blocks within this container
  container.querySelectorAll('pre code').forEach((block) => {
      hljs.highlightElement(block);
  });

  // Meta row (Time, Actions)
  const meta = document.createElement("div");
  meta.className = "msg-meta";
  meta.innerHTML = `<span>${m.time || ''}</span>`;
  
  if(m.role === "assistant" && !m.img) {
      
      if(m.isTextMode) {
          const docCopyBtn = document.createElement("button");
          docCopyBtn.className = "action-btn"; docCopyBtn.innerHTML = "📋 Copy Text";
          docCopyBtn.onclick = () => copyDocumentText(docCopyBtn, m.reply);
          meta.appendChild(docCopyBtn);
          
          const docExportBtn = document.createElement("button");
          docExportBtn.className = "action-btn"; docExportBtn.innerHTML = "📥 Export to Word";
          docExportBtn.onclick = () => exportDocument(m.reply, chats.find(c=>c.id===active).title);
          meta.appendChild(docExportBtn);
      }

      if(m.isScriptMode) {
          const scriptDlBtn = document.createElement("button");
          scriptDlBtn.className = "action-btn"; scriptDlBtn.innerHTML = "💾 Download Script";
          scriptDlBtn.onclick = () => downloadScript(m.reply, ".js"); // user can manually rename extension
          meta.appendChild(scriptDlBtn);
      }

      // Add Regenerate
      const chat = chats.find(c=>c.id===active);
      if(idx === chat.messages.length - 1) {
          const regenBtn = document.createElement("button");
          regenBtn.className = "action-btn"; regenBtn.innerHTML = "🔄 Regenerate";
          regenBtn.onclick = () => regenerateMsg(idx);
          meta.appendChild(regenBtn);
      }
  }
  
  container.appendChild(meta);
  $("view").appendChild(container);
  $("view").scrollTop = $("view").scrollHeight;
}

function handleFileUpload(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  
  // Vision Integration: Convert image to Base64
  if(file.type.startsWith('image/')) {
      reader.onload = e => { 
          pendingBase64Image = e.target.result;
          inputArea.value += `[Attached Image: ${file.name}] `; 
          inputArea.dispatchEvent(new Event('input')); 
      };
      reader.readAsDataURL(file);
  } else {
      // Standard Text file attachment
      reader.onload = e => { 
          inputArea.value += `\n[File: ${file.name}]\n${e.target.result}\n`; 
          inputArea.dispatchEvent(new Event('input')); 
      };
      reader.readAsText(file);
  }
}
